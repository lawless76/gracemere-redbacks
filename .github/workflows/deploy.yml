# ============================================================
# Gracemere Redbacks – GitHub Actions: Build & Push Image
# ============================================================
# Triggers on every push to main — including commits made by
# Decap CMS when editors save content changes.
#
# Workflow:
#  1. Install Node deps
#  2. Build Astro → static HTML/CSS/JS in /dist
#  3. Build Docker image (Nginx serving /dist)
#  4. Push to ghcr.io
#
# After this runs, go to Dockge, pull the new image, and
# restart the gracemere-redbacks stack.
# ============================================================

name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # Required to push to ghcr.io

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/lawless76/gracemere-redbacks:latest
            ghcr.io/lawless76/gracemere-redbacks:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
