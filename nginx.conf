server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent Nginx from issuing absolute redirects that lose the port.
    # Critical when Docker maps a non-standard port (5000 → 80).
    absolute_redirect off;
    port_in_redirect off;

    location / {
        try_files $uri $uri/index.html $uri.html =404;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets aggressively
    location ~* \.(css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|svg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache HTML (so deploys take effect immediately)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
