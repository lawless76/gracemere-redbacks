# ============================================================
# Gracemere Redbacks – Docker Compose (Dockge stack)
# ============================================================
# Astro static site served by Nginx.
# No database needed — content lives in the Git repo.
#
# Usage:
#   Pull the pre-built image from GitHub Container Registry and
#   start the stack in Dockge. No .env file required.
# ============================================================

services:

  web:
    image: ghcr.io/lawless76/gracemere-redbacks:latest
    restart: unless-stopped
    ports:
      - "5200:80"
